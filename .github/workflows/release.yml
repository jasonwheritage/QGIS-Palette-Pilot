name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Compute new version
        id: version
        run: |
          current=$(grep -E '^version=' palette_pilot/metadata.txt | cut -d= -f2)
          if [ -z "$current" ]; then
            echo "::error::Could not read version from palette_pilot/metadata.txt"
            exit 1
          fi
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ github.event.inputs.bump }}: $current -> $new_version"

      - name: Create release branch
        run: |
          git checkout -b "dispatch_release_${{ steps.version.outputs.new }}"

      - name: Update version in metadata.txt
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.new }}/" palette_pilot/metadata.txt
          updated=$(grep -E '^version=' palette_pilot/metadata.txt | cut -d= -f2)
          if [ "$updated" != "${{ steps.version.outputs.new }}" ]; then
            echo "::error::Failed to update version in metadata.txt (expected ${{ steps.version.outputs.new }}, got $updated)"
            exit 1
          fi
          echo "Updated metadata.txt: version=$updated"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palette_pilot/metadata.txt
          git commit -m "Bump version to ${{ steps.version.outputs.new }}"

      - name: Push release branch
        run: |
          git push origin "dispatch_release_${{ steps.version.outputs.new }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Release v${{ steps.version.outputs.new }}" \
            --body "## Release v${{ steps.version.outputs.new }}

          This PR was automatically created by the release workflow.

          ### Changes
          - Bumps version from \`${{ steps.version.outputs.current }}\` to \`${{ steps.version.outputs.new }}\`

          ### Next Steps
          1. Review the version bump in \`palette_pilot/metadata.txt\`
          2. Merge this PR to publish the release
          3. Once merged, a draft GitHub release with the plugin ZIP will be created automatically" \
            --base main \
            --head "dispatch_release_${{ steps.version.outputs.new }}"
