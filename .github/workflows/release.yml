name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Compute new version from latest published release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the latest published (non-draft, non-prerelease) release tag
          latest_tag=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$latest_tag" ]; then
            echo "No published release found; starting from 0.0.0"
            current="0.0.0"
          else
            current="${latest_tag#v}"
            echo "Latest published release: $latest_tag (version $current)"
          fi
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          echo "latest_published_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ github.event.inputs.bump }}: $current -> $new_version"

      - name: Delete stale draft releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Remove any existing draft releases so they don't interfere
          gh release list --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting draft release $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Update version in metadata.txt
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.new }}/" palette_pilot/metadata.txt
          updated=$(grep -E '^version=' palette_pilot/metadata.txt | cut -d= -f2)
          if [ "$updated" != "${{ steps.version.outputs.new }}" ]; then
            echo "::error::Failed to update version in metadata.txt (expected ${{ steps.version.outputs.new }}, got $updated)"
            exit 1
          fi
          echo "Updated metadata.txt: version=$updated"

      - name: Create release ZIP
        run: |
          python3 scripts/create_release_zip.py -o "palette_pilot_${{ steps.version.outputs.tag }}.zip"
          if [ ! -f "palette_pilot_${{ steps.version.outputs.tag }}.zip" ]; then
            echo "::error::Release ZIP was not created"
            exit 1
          fi

      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palette_pilot/metadata.txt
          git commit -m "Bump version to ${{ steps.version.outputs.new }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "${{ steps.version.outputs.tag }}"
            "palette_pilot_${{ steps.version.outputs.tag }}.zip"
            --title "Palette Pilot ${{ steps.version.outputs.tag }}"
            --draft
            --generate-notes
          )
          if [ -n "${{ steps.version.outputs.latest_published_tag }}" ]; then
            release_args+=(--notes-start-tag "${{ steps.version.outputs.latest_published_tag }}")
          fi
          release_args+=(
            --notes "## Palette Pilot ${{ steps.version.outputs.tag }}

          ### Installation

          1. Download **palette_pilot_${{ steps.version.outputs.tag }}.zip** from the assets below.
          2. In QGIS go to **Plugins → Manage and Install Plugins → Install from ZIP**.
          3. Select the downloaded file and click **Install Plugin**."
          )

          gh release create "${release_args[@]}"
