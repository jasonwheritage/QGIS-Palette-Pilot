name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'dispatch_release_')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Extract version
        id: version
        run: |
          version=$(grep -E '^version=' palette_pilot/metadata.txt | cut -d= -f2)
          if [ -z "$version" ]; then
            echo "::error::Could not read version from palette_pilot/metadata.txt"
            exit 1
          fi
          echo "new=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing release for version $version"

      - name: Create release ZIP
        run: |
          python3 scripts/create_release_zip.py -o "palette_pilot_${{ steps.version.outputs.tag }}.zip"
          if [ ! -f "palette_pilot_${{ steps.version.outputs.tag }}.zip" ]; then
            echo "::error::Release ZIP was not created"
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Remove existing tag if present (e.g. from a previous failed run)
          git tag -d "${{ steps.version.outputs.tag }}" 2>/dev/null || true
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      - name: Find latest published release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty')
          echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "Latest published release tag: ${latest_tag:-none}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "${{ steps.version.outputs.tag }}"
            "palette_pilot_${{ steps.version.outputs.tag }}.zip"
            --title "Palette Pilot ${{ steps.version.outputs.tag }}"
            --draft
            --generate-notes
          )
          if [ -n "${{ steps.latest.outputs.tag }}" ]; then
            release_args+=(--notes-start-tag "${{ steps.latest.outputs.tag }}")
          fi
          release_args+=(
            --notes "## Palette Pilot ${{ steps.version.outputs.tag }}

          ### Installation

          1. Download **palette_pilot_${{ steps.version.outputs.tag }}.zip** from the assets below.
          2. In QGIS go to **Plugins → Manage and Install Plugins → Install from ZIP**.
          3. Select the downloaded file and click **Install Plugin**."
          )

          gh release create "${release_args[@]}"
