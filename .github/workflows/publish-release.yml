name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'dispatch_release_')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Extract version
        id: version
        run: |
          version=$(grep -E '^version=' palette_pilot/metadata.txt | cut -d= -f2)
          if [ -z "$version" ]; then
            echo "::error::Could not read version from palette_pilot/metadata.txt"
            exit 1
          fi
          echo "new=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing release for version $version"

      - name: Create release ZIP
        run: |
          python3 scripts/create_release_zip.py -o "palette_pilot_${{ steps.version.outputs.tag }}.zip"
          if [ ! -f "palette_pilot_${{ steps.version.outputs.tag }}.zip" ]; then
            echo "::error::Release ZIP was not created"
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Palette Pilot ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: palette_pilot_${{ steps.version.outputs.tag }}.zip
          body: |
            ## Palette Pilot ${{ steps.version.outputs.tag }}

            ### Installation

            1. Download **palette_pilot_${{ steps.version.outputs.tag }}.zip** from the assets below.
            2. In QGIS go to **Plugins → Manage and Install Plugins → Install from ZIP**.
            3. Select the downloaded file and click **Install Plugin**.
